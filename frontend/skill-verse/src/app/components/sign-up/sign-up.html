<div class="outer-container">
    <div class="inner-container">
        <h1>Sign Up</h1>
        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" [(ngModel)]="signUpData.username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" [(ngModel)]="signUpData.password" name="password" required>
            </div>
            <div class="form-group">
                <select id="role" [(ngModel)]="signUpData.role" name="role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="STUDENT">Student</option>
                    <option value="CREATOR">Creator</option>
                </select>
            </div>
            <button type="submit">Sign Up</button>
        </form>
    </div>
</div>

server:
  port: 8081

spring:
  application:
    name: User-Service

  datasource:
    url: jdbc:mysql://localhost:3306/skillverse_users_data
    username: root
    password: Sql#1541
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  config:
    import: optional:configserver:http://localhost:8085

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: user-group
      auto-offset-reset: earliest
      enable-auto-commit: false

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.skillverse.userservice.entity.UserCreatedEvent

    listener:
      ack-mode: record

management:
  endpoints:
    web:
      exposure:
        include: "*"